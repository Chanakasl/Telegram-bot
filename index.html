<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chucky Movie Zone Bot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        /* ── TOKENS ── */
        :root {
            --void:       #050005;
            --surface:    #0D0003;
            --deep-red:   #8B0000;
            --crimson:    #CC0000;
            --neon:       #FF1A1A;
            --glow:       #FF7777;
            --grid-line:  rgba(139, 0, 0, 0.13);
            --cyan-ghost: #00EEFF;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── BODY ── */
        body {
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            text-align: center;
            background-color: var(--void);
            background-image:
                radial-gradient(ellipse 75% 55% at 50% 44%,
                    rgba(110, 0, 0, 0.2) 0%,
                    transparent 65%);
            color: #fff;
            padding-top: 15%;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            animation: bootUp 2s ease-out both;
        }

        /* Grid lines */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 52px 52px;
            pointer-events: none;
            z-index: 0;
        }

        /* Scanlines + vignette */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background:
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 0, 0, 0.11) 0px,
                    rgba(0, 0, 0, 0.11) 1px,
                    transparent 1px,
                    transparent 4px),
                radial-gradient(ellipse at 50% 50%,
                    transparent 35%,
                    rgba(0, 0, 0, 0.72) 100%);
            pointer-events: none;
            z-index: 100;
        }

        h1, p, .btn { position: relative; z-index: 10; }

        /* ── H1 GLITCH ── */
        h1 {
            color: var(--neon);
            font-size: clamp(1.1rem, 2.8vw, 2.15rem);
            letter-spacing: 0.13em;
            text-transform: uppercase;
            display: inline-block;
            position: relative;
            text-shadow:
                0 0 7px var(--neon),
                0 0 20px var(--crimson),
                0 0 55px var(--deep-red);
            animation:
                fadeInUp   1s    0.2s ease-out both,
                glitch     5.5s  2.2s infinite,
                crtFlicker 9s    3.5s infinite;
        }

        /* Glitch overlay bars — no text required */
        h1::before, h1::after {
            content: '';
            position: absolute;
            left: 0;
            width: 100%;
            height: 0;
            pointer-events: none;
            opacity: 0;
        }
        h1::before {
            background: rgba(0, 238, 255, 0.09);
            mix-blend-mode: screen;
            animation: barA 5.5s 2.2s infinite;
        }
        h1::after {
            background: rgba(255, 26, 26, 0.18);
            animation: barB 5.5s 2.2s infinite;
        }

        /* ── PARAGRAPH ── */
        p {
            font-size: 16px;
            color: #b84040;
            letter-spacing: 0.07em;
            margin-top: 1.4rem;
            text-shadow: 0 0 9px rgba(210, 50, 50, 0.38);
            animation: fadeInUp 0.8s 0.75s ease-out both;
        }

        /* ── BUTTON ── */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: transparent;
            color: var(--neon);
            text-decoration: none;
            border-radius: 2px;
            border: 1px solid var(--neon);
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            letter-spacing: 0.14em;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            position: relative;
            overflow: hidden;
            text-shadow: 0 0 10px var(--neon);
            box-shadow:
                0 0 12px rgba(255, 26, 26, 0.28),
                inset 0 0 12px rgba(255, 26, 26, 0.04);
            animation:
                fadeInUp   0.8s  1.1s ease-out both,
                btnBreathe 3.8s  2.8s ease-in-out infinite;
            transition:
                background-color 0.25s,
                box-shadow       0.25s,
                transform        0.2s,
                color            0.25s,
                border-color     0.25s,
                text-shadow      0.25s;
        }

        /* Sweeping shimmer */
        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                108deg,
                transparent 20%,
                rgba(255, 110, 110, 0.14) 50%,
                transparent 80%);
            transform: translateX(-220%);
            animation: btnShimmer 3.8s 2.8s ease-in-out infinite;
        }

        /* Top highlight line */
        .btn::after {
            content: '';
            position: absolute;
            top: 0; left: 8%; right: 8%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glow), transparent);
            opacity: 0.45;
        }

        .btn:hover {
            background-color: rgba(255, 26, 26, 0.09);
            border-color: var(--glow);
            color: var(--glow);
            text-shadow:
                0 0 16px var(--neon),
                0 0 38px var(--crimson);
            box-shadow:
                0 0 38px rgba(255, 26, 26, 0.65),
                0 0 75px rgba(255, 26, 26, 0.24),
                inset 0 0 28px rgba(255, 26, 26, 0.08);
            transform: translateY(-2px);
        }

        /* ══════════════════════════════
           KEYFRAMES
        ══════════════════════════════ */

        /* Page boot — desaturation dissolve in */
        @keyframes bootUp {
            0%   { opacity: 0; filter: brightness(2.2) saturate(0) contrast(0.5); }
            35%  { opacity: 0.5; filter: brightness(1.4) saturate(0.2); }
            100% { opacity: 1; filter: brightness(1) saturate(1) contrast(1); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* CRT phosphor flicker */
        @keyframes crtFlicker {
            0%,93%,100% { opacity: 1; }
            93.4%       { opacity: 0.78; }
            93.8%       { opacity: 1; }
            94.2%       { opacity: 0.18; }
            94.6%       { opacity: 0.95; }
            95%         { opacity: 0.42; }
            95.4%       { opacity: 1; }
            95.8%       { opacity: 0.88; }
            96.2%       { opacity: 0.32; }
            96.6%       { opacity: 1; }
        }

        /* Multi-burst glitch with chromatic aberration */
        @keyframes glitch {
            0%,80%,100% {
                transform: none;
                text-shadow:
                    0 0 7px var(--neon),
                    0 0 20px var(--crimson),
                    0 0 55px var(--deep-red);
                filter: none;
            }
            81% {
                transform: skewX(-11deg) translateX(5px);
                text-shadow:
                    -6px 0 var(--cyan-ghost),
                    6px 0 var(--neon),
                    0 0 22px var(--crimson);
                filter: brightness(1.35);
            }
            82% {
                transform: skewX(7deg) translateX(-5px);
                text-shadow:
                    6px 0 var(--cyan-ghost),
                    -6px 0 var(--neon),
                    0 0 22px var(--crimson);
                filter: brightness(1.1);
            }
            83% {
                transform: translateX(9px);
                text-shadow:
                    -9px 0 var(--cyan-ghost),
                    9px 0 var(--neon),
                    0 0 20px var(--crimson);
                filter: brightness(1.2);
            }
            84% {
                transform: none;
                text-shadow:
                    0 0 7px var(--neon),
                    0 0 20px var(--crimson),
                    0 0 55px var(--deep-red);
                filter: none;
            }
            88% {
                transform: skewX(-4deg) translateX(-3px);
                text-shadow:
                    4px 0 var(--cyan-ghost),
                    -4px 0 var(--neon);
                filter: brightness(1.05);
            }
            89% {
                transform: none;
                text-shadow:
                    0 0 7px var(--neon),
                    0 0 20px var(--crimson),
                    0 0 55px var(--deep-red);
                filter: none;
            }
            93% {
                transform: translateX(-6px) scaleY(1.01);
                text-shadow:
                    6px 0 var(--cyan-ghost),
                    0 0 20px var(--crimson);
                filter: brightness(1.15);
            }
            94% {
                transform: none;
                text-shadow:
                    0 0 7px var(--neon),
                    0 0 20px var(--crimson),
                    0 0 55px var(--deep-red);
                filter: none;
            }
        }

        /* Cyan artifact bar */
        @keyframes barA {
            0%,80%,100% { height: 0; top: 0; opacity: 0; }
            81%    { height: 11px; top: 22%; opacity: 1; }
            81.8%  { height: 5px;  top: 58%; opacity: 0.7; }
            82.5%  { height: 0;              opacity: 0; }
            88.2%  { height: 7px;  top: 38%; opacity: 0.55; }
            88.7%  { height: 0;              opacity: 0; }
        }

        /* Red artifact bar */
        @keyframes barB {
            0%,80%,100% { height: 0; top: 0; opacity: 0; }
            81.3%  { height: 8px;  top: 52%; opacity: 0.6; }
            82.1%  { height: 4px;  top: 28%; opacity: 0.45; }
            83%    { height: 0;              opacity: 0; }
            93.2%  { height: 6px;  top: 68%; opacity: 0.5; }
            93.7%  { height: 0;              opacity: 0; }
        }

        /* Button breathing glow */
        @keyframes btnBreathe {
            0%,100% {
                box-shadow:
                    0 0 12px rgba(255, 26, 26, 0.28),
                    inset 0 0 12px rgba(255, 26, 26, 0.04);
            }
            50% {
                box-shadow:
                    0 0 38px rgba(255, 26, 26, 0.65),
                    0 0 75px rgba(255, 26, 26, 0.24),
                    inset 0 0 22px rgba(255, 26, 26, 0.09);
            }
        }

        /* Button shimmer sweep */
        @keyframes btnShimmer {
            0%,100% { transform: translateX(-220%); }
            45%,55% { transform: translateX(220%);  }
        }

        /* Respect reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <h1>CHUCKY MOVIE ZONE PRO - ONLINE 🚀</h1>
    <p>Your Telegram Bot is running successfully on Netlify!</p>
    <a href="/.netlify/functions/bot/setup" class="btn">⚙️ Set Webhook</a>
</body>
</html>
